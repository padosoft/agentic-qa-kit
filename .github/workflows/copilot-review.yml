name: Request Copilot Review

# Automatically requests GitHub Copilot Code Review on every pull request open / sync.
# Mirrors the workflow documented in AGENTS.md § Branch and PR loop.
#
# If `gh pr edit --add-reviewer copilot-pull-request-reviewer` fails because the token
# lacks `read:project` scope, this workflow falls back to the GraphQL `requestReviewsByLogin`
# mutation. If both paths leave `reviewRequests` empty, the maintainer must request Copilot
# review manually from the PR sidebar.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-copilot-review:
    name: Request Copilot Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false
    steps:
      - name: Try gh CLI fast path
        id: gh-add
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-reviewer copilot-pull-request-reviewer
          code=$?
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: GraphQL fallback (requestReviewsByLogin)
        if: steps.gh-add.outputs.exitcode != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_NODE: ${{ github.event.pull_request.node_id }}
        run: |
          set -e
          read -r -d '' QUERY <<'EOF' || true
          mutation RequestReviewsByLogin($pullRequestId: ID!, $botLogins: [String!], $union: Boolean!) {
            requestReviewsByLogin(input: {pullRequestId: $pullRequestId, botLogins: $botLogins, union: $union}) {
              clientMutationId
            }
          }
          EOF
          gh api graphql \
            -f query="$QUERY" \
            -F pullRequestId="$PR_NODE" \
            -F botLogins[]='copilot-pull-request-reviewer[bot]' \
            -F union=true || echo "GraphQL mutation returned non-zero. Manual reviewer assignment may be required."

      - name: Verify review request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers" || true
