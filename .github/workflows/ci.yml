name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'task/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    name: Meta (workflow lint + link check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Markdown link check
        continue-on-error: true
        run: |
          bunx --bun markdown-link-check --quiet 'docs/**/*.md' README.md AGENTS.md CLAUDE.md GEMINI.md .github/copilot-instructions.md
        # advisory at bootstrap (continue-on-error); flip to hard-fail once docs stabilize.
        # Failure is surfaced visibly in the job summary even though it does not fail the workflow.

  typecheck-lint:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Build dependencies first
        # Workspace packages reference each other via their published entry
        # (dist/index.{js,d.ts}). Typecheck of a downstream package therefore
        # needs the upstream dist to exist. Run a full build before typecheck.
        if: ${{ hashFiles('packages/**/tsconfig.json') != '' }}
        run: bun run build

      - name: Typecheck (all workspaces)
        run: bun run typecheck
        if: ${{ hashFiles('packages/**/tsconfig.json') != '' }}

  test-unit:
    name: Unit tests (Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all workspaces (tests import the built dist/)
        if: ${{ hashFiles('packages/**/*.test.ts') != '' }}
        run: bun run build

      - name: Run unit tests
        if: ${{ hashFiles('packages/**/*.test.ts') != '' }}
        # Bun's test runner discovers test/*.test.ts across the workspace and
        # executes them via the Bun runtime (node:test API is bun-compatible).
        # Running build first guarantees dist/index.js exists for test imports.
        #
        # By design this job validates only the Bun execution path: the same
        # test files run under plain Node 22 (with --experimental-strip-types)
        # in the separate "Unit tests (Node 22 LTS)" job, so both runtimes are
        # gated independently.
        run: bun test --coverage

      - name: Skip notice
        if: ${{ hashFiles('packages/**/*.test.ts') == '' }}
        run: echo "No tests yet — gate placeholder."

  test-unit-node:
    name: Unit tests (Node 22 LTS)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Bun (for monorepo manager only)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all workspaces topologically
        # The downstream packages' pretest hook compiles against the upstream
        # packages' dist/. Build once up front in topological order so each
        # package's pretest sees a fresh dist for everything it imports.
        if: ${{ hashFiles('packages/**/tsconfig.json') != '' }}
        run: bun run build

      - name: Run unit tests under Node
        env:
          AQA_PKG_RUNNER: npm
        run: |
          set -e
          if [ ! -d packages ]; then
            echo "No packages directory yet — gate placeholder (pass)."
            exit 0
          fi
          # `bun install` populated node_modules at the repo root (workspace hoisting)
          # and inside each package, so `npm run` from a package dir resolves bins
          # and dependencies fine without ever needing a package-lock.json. `npm`
          # here is used purely as a script runner — no install step.
          worst=0
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ] && grep -q '"test"' "$pkg/package.json"; then
              echo "::group::Testing $pkg under Node"
              # Each package's "test" script is the canonical entrypoint: it builds the
              # package (pretest hook) and runs node --test against the result. We run
              # it via npm so the Node 22 fallback gate exercises Node-only execution
              # of both the build and the tests — not Bun's runtime.
              if ! (cd "$pkg" && npm run --silent test); then
                echo "::error::Node tests failed in $pkg"
                worst=1
              fi
              echo "::endgroup::"
            fi
          done
          exit $worst

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (all workspaces)
        run: |
          if [ -d packages ]; then
            bun run build
          else
            echo "No packages yet — gate placeholder."
          fi

  e2e-cli:
    name: E2E (CLI smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all workspaces
        run: bun run build

      - name: Run CLI smoke checks
        run: bun run test:e2e-cli

  e2e:
    name: E2E (Playwright, admin UI)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        if: ${{ hashFiles('packages/admin/playwright.config.*') != '' }}
        run: bunx playwright install --with-deps chromium

      - name: Build admin (Vite) for the dev server Playwright will boot
        if: ${{ hashFiles('packages/admin/playwright.config.*') != '' }}
        run: bun run build

      - name: Run Playwright (admin SPA)
        if: ${{ hashFiles('packages/admin/playwright.config.*') != '' }}
        working-directory: packages/admin
        run: bunx playwright test --reporter=line

      - name: Skip notice
        if: ${{ hashFiles('packages/admin/playwright.config.*') == '' }}
        run: echo "No playwright config under packages/admin — gate placeholder."

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
