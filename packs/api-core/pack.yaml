schema_version: "1"
name: pack-api-core
version: 0.1.0
description: "Baseline API pack — auth, idempotency, pagination, rate-limit, contract scenarios."
author: Padosoft
license: Apache-2.0
applies_when:
  sut_type: [api]
# Intentionally no `framework` clause: this pack ships generic API scenarios
# (idempotency, auth-token replay) that don't depend on a specific framework,
# and `aqa init` may classify a project as `sut_type=api` (via src/server.ts
# detection) without identifying its framework. Constraining to a named
# framework list would silently drop the pack for plain Node/Bun APIs.
templates: []
scenarios:
  - scenarios/idempotency.yaml
  - scenarios/auth-token-replay.yaml
risks:
  - risks/api.yaml
oracles:
  - oracles/http_status.yaml
probes:
  - probes/invalid_payload.yaml
