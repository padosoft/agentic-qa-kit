# Default values for agentic-qa-kit Helm chart (v1.1).
#
# All non-trivial knobs are documented inline.

server:
  image:
    repository: ghcr.io/padosoft/agentic-qa-kit-server
    tag: "1.1.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits:   { cpu: "1000m", memory: "1Gi" }
  # Hash-chained audit log path (v0.2 contract — must be a writable volume in
  # production; in-cluster default is an emptyDir for the scaffold).
  auditLogPath: /var/lib/aqa/events.jsonl

runner:
  image:
    repository: ghcr.io/padosoft/agentic-qa-kit-runner
    tag: "1.1.0"
    pullPolicy: IfNotPresent
  # StatefulSet — stable identity + per-runner PVC for deterministic fixtures.
  replicaCount: 2
  storage:
    size: 5Gi
    storageClassName: ""
  resources:
    requests: { cpu: "500m", memory: "512Mi" }
    limits:   { cpu: "2000m", memory: "2Gi" }

ingress:
  enabled: false
  className: ""
  host: "aqa.example.com"
  tls:
    enabled: false
    secretName: ""
  annotations: {}

networkPolicy:
  # When enabled, locks down pod-to-pod traffic:
  #   - server: ingress only from ingress controller + runner pods
  #   - runner: egress to server + Postgres + DNS only (no internet by default)
  enabled: true
  # Extra egress CIDRs the runner is allowed to reach (e.g. the QA target).
  runnerExtraEgressCidrs: []

postgres:
  # Two modes:
  #   - subchart.enabled=true  → in-cluster Postgres (dev / PoC only)
  #   - url / urlSecretRef     → bring-your-own managed Postgres (prod)
  subchart:
    enabled: false
    image: "postgres:16-alpine"
    storage: "10Gi"
    storageClassName: ""
    auth:
      database: "aqa"
      username: "aqa"
      password: "change-me" # set via --set or secret in production
  url: ""
  urlSecretRef: ""

# Cost governance hard cap (Task 11). Server refuses to start with budget=0.
cost:
  monthlyBudgetUsd: 100

# Feature flags echoing the determinism contract (Task 10). These exist so
# operators can pin behavior across replicas.
determinism:
  level: "L1" # L1 = same-deps, L2 = same-fixtures, L3 = same-bytes
