apiVersion: v2
name: agentic-qa-kit
description: |
  Helm chart for the agentic-qa-kit server + runner fleet. v1.1 ships the
  full stack: server Deployment + Service, runner StatefulSet with stable
  identity and per-pod fixture PVC, optional Ingress, NetworkPolicy that
  confines the runner egress to server + DNS + operator-provided CIDRs,
  and an optional in-cluster Postgres subchart for dev / PoC.
type: application
version: 1.1.0
appVersion: "1.1.0"
keywords:
  - agentic
  - qa
  - security
  - stride
  - fmea
home: https://github.com/padosoft/agentic-qa-kit
sources:
  - https://github.com/padosoft/agentic-qa-kit
maintainers:
  - name: padosoft
    email: lorenzo.padovani@padosoft.com
